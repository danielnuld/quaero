name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # The webview app shell needs GTK4 + WebKitGTK on Linux. macOS uses the
      # system WebKit framework; Windows fetches WebView2 via the webview build.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libmariadb-dev unixodbc-dev libmongoc-dev

      # Provides a recent CMake + Ninja on all three platforms.
      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      # Make MSVC (cl.exe) available to the Ninja generator on Windows.
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Compiler-output cache. Today the build is dependency-free; this is the
      # caching layer that pays off once drivers link external client libraries.
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Builds the MySQL driver against MariaDB Connector/C and runs the gated
  # integration test against a real MariaDB service (Linux only — service
  # containers require a Linux runner). The core build skips the webview app
  # here, so no GTK is needed.
  mysql-integration:
    name: mysql-integration
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: quaero_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - name: Install MariaDB Connector/C
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DQUAERO_BUILD_APP=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          QUAERO_MYSQL_DSN: '{"host":"127.0.0.1","port":3306,"user":"root","password":"root","database":"quaero_test"}'
          # MariaDB 11 ships with TLS enabled (auto-generated certs), so
          # ssl_mode=required encrypts without needing a CA on the client.
          QUAERO_MYSQL_SSL_DSN: '{"host":"127.0.0.1","port":3306,"user":"root","password":"root","database":"quaero_test","ssl_mode":"required"}'
        run: ctest --test-dir build --output-on-failure

  # Builds the MongoDB driver against the mongo-c-driver and runs the gated
  # integration test against a real MongoDB service (Linux only — service
  # containers require a Linux runner). The service is pre-seeded with the
  # quaero_it collection via a throwaway mongosh container.
  mongodb-integration:
    name: mongodb-integration
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval=5s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - name: Install the mongo-c-driver
        run: |
          sudo apt-get update
          sudo apt-get install -y libmongoc-dev

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Seed test data
        run: >
          docker run --rm --network host mongo:7
          mongosh --quiet "mongodb://127.0.0.1:27017/quaero_test"
          --eval 'db.quaero_it.deleteMany({});
          db.quaero_it.insertMany([{_id:1,name:"alice"},{_id:2,name:"bob",extra:{k:1}}])'

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DQUAERO_BUILD_APP=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          QUAERO_MONGODB_DSN: '{"host":"127.0.0.1","port":27017,"database":"quaero_test"}'
        run: ctest --test-dir build --output-on-failure

  # Builds the core with SSH-tunnel support (QUAERO_SSH=ON fetches libssh2) and
  # the MySQL driver, then opens a real connection to the MariaDB service THROUGH
  # an SSH port-forward to the runner's own sshd. Validates the engine-agnostic
  # tunnel end to end (Linux only — needs the service container + a local sshd).
  ssh-tunnel-integration:
    name: ssh-tunnel-integration
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: quaero_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev libssl-dev openssh-server

      - name: Set up SSH to localhost
        run: |
          ssh-keygen -t rsa -b 2048 -N "" -f "$HOME/.ssh/id_tunnel"
          cat "$HOME/.ssh/id_tunnel.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          sudo systemctl start ssh
          # Sanity-check the full SSH path before relying on it from the tunnel.
          # Keep this probe out of the default known_hosts: it would record only
          # the key type the OpenSSH client negotiates (ed25519), which need not
          # match the type libssh2 presents from the tunnel — a stale-looking
          # entry the driver would then reject as a mismatch.
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i "$HOME/.ssh/id_tunnel" "$(whoami)@127.0.0.1" true
          # Record ALL of the server's host key types so the tunnel's strict
          # verification (issue #81) matches whichever one libssh2 negotiates.
          ssh-keyscan -t rsa,ecdsa,ed25519 -p 22 127.0.0.1 \
            > "$HOME/.ssh/known_hosts_quaero" 2>/dev/null

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug -DQUAERO_BUILD_APP=OFF -DQUAERO_SSH=ON

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          QUAERO_SSH_DEBUG: "1"
        run: |
          export QUAERO_SSH_DSN="{\"host\":\"127.0.0.1\",\"port\":3306,\"user\":\"root\",\"password\":\"root\",\"database\":\"quaero_test\",\"ssh_host\":\"127.0.0.1\",\"ssh_port\":22,\"ssh_user\":\"$(whoami)\",\"ssh_auth\":\"key\",\"ssh_key\":\"$HOME/.ssh/id_tunnel\",\"ssh_known_hosts\":\"$HOME/.ssh/known_hosts_quaero\",\"ssh_host_key_policy\":\"strict\"}"
          ctest --test-dir build --output-on-failure -R ssh_tunnel_integration

  # Guards the x86 release build (the shipped installer is x86 because the IBM
  # Informix ODBC driver is 32-bit only). Builds the core + all drivers with the
  # same standalone i686 MinGW toolchain used locally, exercising the three
  # from-source dependencies in 32-bit: MariaDB Connector/C (QUAERO_MARIADB,
  # static), mongo-c-driver (QUAERO_MONGOC), libssh2 (QUAERO_SSH) and libpq
  # (QUAERO_LIBPQ, static, from the PostgreSQL source — no 32-bit libpq ships).
  # The app shell is skipped (QUAERO_BUILD_APP=OFF) to keep the job lean; unit
  # tests run (32-bit exes run under WOW64), integration tests self-skip without
  # a server.
  windows-x86:
    name: windows-x86
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Standalone winlibs i686 MinGW (GCC 13.2.0, UCRT, posix threads, dwarf
      # EH) — the same distribution the toolchain file expects at C:/mingw32.
      # Keep this pin in step with cmake/toolchain-i686-mingw.cmake's default.
      # pwsh (not bash): here `tar` is the system bsdtar, which extracts .zip;
      # Git bash's GNU tar cannot. curl.exe is the real curl on the runner.
      - name: Install winlibs i686 MinGW
        shell: pwsh
        run: |
          $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/13.2.0posix-18.1.5-11.0.1-ucrt-r8/winlibs-i686-posix-dwarf-gcc-13.2.0-mingw-w64ucrt-11.0.1-r8.zip"
          curl.exe -sSL -o mingw32.zip $url
          # The archive's top-level folder is mingw32/, so this yields C:\mingw32.
          tar -xf mingw32.zip -C C:\
          C:\mingw32\bin\gcc.exe --version

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        shell: bash
        # CMAKE_POLICY_VERSION_MINIMUM lets CMake 4.x configure the fetched
        # dependencies (MariaDB Connector/C, libssh2, mongo-c-driver) whose
        # cmake_minimum_required predates 3.5, which CMake 4 otherwise rejects.
        run: >
          cmake -S . -B build-x86 -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-i686-mingw.cmake
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          -DQUAERO_BUILD_APP=OFF
          -DQUAERO_SSH=ON -DQUAERO_MARIADB=ON -DQUAERO_MONGOC=ON -DQUAERO_LIBPQ=ON

      - name: Build
        shell: bash
        run: cmake --build build-x86

      # Unit tests only — the integration tests need live DB/SSH servers this job
      # deliberately does not provision (those run in the Linux jobs above).
      - name: Test
        shell: bash
        run: ctest --test-dir build-x86 --output-on-failure -E integration
