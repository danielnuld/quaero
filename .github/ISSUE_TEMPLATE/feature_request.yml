name: "✨ Feature request"
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Quaero doesn't support well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: ["core", "frontend", "driver", "ipc", "build", "docs"]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
