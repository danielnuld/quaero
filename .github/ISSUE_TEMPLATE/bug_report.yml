name: "🐛 Bug report"
description: Report a problem in Quaero
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect to ...
        2. Run ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: ["core", "frontend", "driver", "ipc", "build", "unknown"]
    validations:
      required: true
  - type: input
    id: engine
    attributes:
      label: Database engine + driver (if relevant)
      placeholder: "PostgreSQL 16 / postgres driver"
  - type: input
    id: os
    attributes:
      label: OS / version
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 14"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
