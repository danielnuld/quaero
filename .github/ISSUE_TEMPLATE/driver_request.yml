name: "🔌 Driver request / contribution"
description: Propose support for a database engine, or offer to build a driver
labels: ["area:driver", "enhancement"]
body:
  - type: input
    id: engine
    attributes:
      label: Database engine
      placeholder: "e.g. ClickHouse, Cassandra, DuckDB"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: C client library
      description: The native client library the driver would link against.
      placeholder: "e.g. clickhouse-cpp, libcassandra, duckdb C API"
  - type: textarea
    id: capabilities
    attributes:
      label: Expected capabilities
      description: Which features can realistically be backed (schemas, views, transactions, DDL, SSL/SSH...)?
  - type: checkboxes
    id: license
    attributes:
      label: Licensing
      options:
        - label: The client library is redistributable (not proprietary). If proprietary, it must ship as a standalone plugin.
  - type: checkboxes
    id: offer
    attributes:
      label: Contribution
      options:
        - label: I'd like to build this driver myself (following the quaero-driver guide).
